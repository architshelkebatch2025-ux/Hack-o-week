<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherBoard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1>WeatherBoard</h1>
    <p>Current Weather Overview</p>

    <div class="controls">
        <button id="unitToggle">°F</button>
        <button id="themeToggle">🌙</button>
    </div>

    <div id="time"></div>
</header>


<!-- WEATHER CARDS -->
<section class="weather-container" id="weatherContainer">

</section>


<!-- FOOTER -->
<footer>
    <p>Static Weather Dashboard Project • Developed for Hackathon</p>
</footer>


<script src="script.js"></script>

</body>
</html>
