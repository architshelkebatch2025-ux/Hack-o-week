<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Linked List Shopping Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
  transition: 0.3s;
}
.light {
  background: #f5f5f5;
  color: #111;
}
.container {
  padding: 20px;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
button {
  cursor: pointer;
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: #6366f1;
  color: white;
  transition: 0.2s;
}
button:hover {
  transform: scale(1.05);
}

/* ===== FORM ===== */
.form {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 15px;
}
input {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

/* ===== CART CARDS ===== */
.cart {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  margin-top: 25px;
}
.card {
  min-width: 200px;
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  position: relative;
  transition: 0.3s;
}
.light .card {
  background: white;
}
.card img {
  width: 100%;
  border-radius: 8px;
}
.card:hover {
  transform: translateY(-5px);
}
.head {
  border: 2px solid lime;
}
.tail {
  border: 2px solid orange;
}

/* ===== ARROWS ===== */
.arrow {
  font-size: 30px;
  display: flex;
  align-items: center;
}

/* ===== INSIGHTS ===== */
.insights {
  margin-top: 20px;
  padding: 10px;
  background: #334155;
  border-radius: 10px;
}

/* ===== SEARCH ===== */
.search {
  margin-top: 15px;
}

/* ===== ANIMATION ===== */
.fade {
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1;}
}
</style>
</head>

<body>
<div class="container">

<header>
  <h2>🛒 Linked List Cart</h2>
  <button onclick="toggleMode()">🌗 Toggle Mode</button>
</header>

<!-- FORM -->
<div class="form">
  <input id="id" placeholder="ID">
  <input id="name" placeholder="Name">
  <input id="price" placeholder="Price">
  <input id="qty" placeholder="Qty">
  <input id="img" placeholder="Image URL">
  <button onclick="addHead()">Add Head</button>
  <button onclick="addTail()">Add Tail</button>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Search by ID or Name" oninput="searchItem()">
</div>

<!-- CART -->
<div id="cart" class="cart"></div>

<!-- INSIGHTS -->
<div class="insights" id="insights"></div>

<button onclick="undoDelete()">Undo Delete</button>

</div>

<script>
/* ===== LINKED LIST ===== */
class Node {
  constructor(data) {
    this.data = data;
    this.next = null;
  }
}

class LinkedList {
  constructor() {
    this.head = null;
  }

  addHead(data) {
    const node = new Node(data);
    node.next = this.head;
    this.head = node;
  }

  addTail(data) {
    const node = new Node(data);
    if (!this.head) {
      this.head = node;
      return;
    }
    let temp = this.head;
    while (temp.next) temp = temp.next;
    temp.next = node;
  }

  removeById(id) {
    if (!this.head) return null;

    if (this.head.data.id == id) {
      const deleted = this.head;
      this.head = this.head.next;
      return deleted;
    }

    let temp = this.head;
    while (temp.next && temp.next.data.id != id) {
      temp = temp.next;
    }

    if (temp.next) {
      const deleted = temp.next;
      temp.next = temp.next.next;
      return deleted;
    }
    return null;
  }

  toArray() {
    let arr = [];
    let temp = this.head;
    while (temp) {
      arr.push(temp.data);
      temp = temp.next;
    }
    return arr;
  }
}

const list = new LinkedList();
let lastDeleted = null;

/* ===== UI FUNCTIONS ===== */
function getInput() {
  return {
    id: document.getElementById("id").value,
    name: document.getElementById("name").value,
    price: parseFloat(document.getElementById("price").value),
    qty: parseInt(document.getElementById("qty").value),
    img: document.getElementById("img").value
  };
}

function addHead() {
  let data = getInput();
  if (!data.id) return alert("ID required");
  list.addHead(data);
  save();
  render();
}

function addTail() {
  let data = getInput();
  if (!data.id) return alert("ID required");
  list.addTail(data);
  save();
  render();
}

function removeItem(id) {
  lastDeleted = list.removeById(id);
  save();
  render();
}

function undoDelete() {
  if (lastDeleted) {
    list.addHead(lastDeleted.data);
    lastDeleted = null;
    render();
  }
}

/* ===== RENDER ===== */
function render() {
  const cart = document.getElementById("cart");
  cart.innerHTML = "";

  let arr = list.toArray();

  arr.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "card fade";

    if (index === 0) card.classList.add("head");
    if (index === arr.length - 1) card.classList.add("tail");

    card.innerHTML = `
      <img src="${item.img}">
      <h3>${item.name}</h3>
      <p>₹${item.price}</p>
      <p>Qty: ${item.qty}</p>
      <button onclick="updateQty('${item.id}', 1)">+</button>
      <button onclick="updateQty('${item.id}', -1)">-</button>
      <button onclick="removeItem('${item.id}')">Remove</button>
    `;

    cart.appendChild(card);

    if (index !== arr.length - 1) {
      const arrow = document.createElement("div");
      arrow.className = "arrow";
      arrow.innerHTML = "➡️";
      cart.appendChild(arrow);
    }
  });

  updateInsights();
}

/* ===== UPDATE QUANTITY ===== */
function updateQty(id, change) {
  let temp = list.head;
  while (temp) {
    if (temp.data.id == id) {
      temp.data.qty += change;
      if (temp.data.qty < 1) temp.data.qty = 1;
      break;
    }
    temp = temp.next;
  }
  save();
  render();
}

/* ===== SEARCH ===== */
function searchItem() {
  let value = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(value) ? "block" : "none";
  });
}

/* ===== INSIGHTS ===== */
function updateInsights() {
  let arr = list.toArray();
  let total = 0;
  let max = 0;
  let maxItem = "";

  arr.forEach(i => {
    total += i.price * i.qty;
    if (i.price > max) {
      max = i.price;
      maxItem = i.name;
    }
  });

  document.getElementById("insights").innerHTML = `
    Total Items: ${arr.length} <br>
    Total Price: ₹${total} <br>
    Most Expensive: ${maxItem}
  `;
}

/* ===== LOCAL STORAGE ===== */
function save() {
  localStorage.setItem("cart", JSON.stringify(list.toArray()));
}

function load() {
  let data = JSON.parse(localStorage.getItem("cart")) || [];
  data.forEach(i => list.addTail(i));
  render();
}

/* ===== THEME ===== */
function toggleMode() {
  document.body.classList.toggle("light");
}

/* ===== INIT ===== */
load();

/* ===== DEMO DATA (if empty) ===== */
if (list.toArray().length === 0) {
  list.addTail({
    id: "1",
    name: "Headphones",
    price: 1999,
    qty: 1,
    img: "https://picsum.photos/200?1"
  });
  list.addTail({
    id: "2",
    name: "Shoes",
    price: 2999,
    qty: 1,
    img: "https://picsum.photos/200?2"
  });
  render();
}
</script>
</body>
</html>
