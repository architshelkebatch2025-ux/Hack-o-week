<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Task Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.container{
width:850px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-size:14px;
font-weight:600;
margin-bottom:4px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
height:60px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4c6ef5;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.task-sections{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;
}

.task-box{
background:#f9f9f9;
padding:15px;
border-radius:10px;
}

ul{
list-style:disc;
padding-left:20px;
}

li{
background:white;
margin:10px 0;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.task-info{
flex:1;
}

.badge{
padding:2px 6px;
border-radius:5px;
font-size:12px;
margin-right:5px;
}

.high{background:#ff6b6b;color:white;}
.medium{background:#ffa94d;color:white;}
.low{background:#51cf66;color:white;}

.category{
background:#339af0;
color:white;
padding:2px 6px;
border-radius:5px;
font-size:12px;
}

.controls button{
margin-left:5px;
}

.progress{
margin-top:25px;
background:#e9ecef;
height:12px;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#4c6ef5;
}

</style>

</head>

<body>

<div class="container">

<h1>Daily Task Tracker</h1>

<!-- INPUT FORM -->

<div class="form-grid">

<div class="form-group">
<label>Task Title</label>
<input id="taskInput" placeholder="Example: Finish assignment">
</div>

<div class="form-group">
<label>Task Category</label>
<select id="category">
<option>Work</option>
<option>Study</option>
<option>Personal</option>
<option>Shopping</option>
</select>
</div>

<div class="form-group">
<label>Priority Level</label>
<select id="priority">
<option value="low">Low Priority</option>
<option value="medium">Medium Priority</option>
<option value="high">High Priority</option>
</select>
</div>

<div class="form-group">
<label>Due Date</label>
<input type="date" id="dueDate">
</div>

<div class="form-group" style="grid-column:1/3;">
<label>Task Description</label>
<textarea id="description" placeholder="Optional details about the task"></textarea>
</div>

</div>

<button onclick="addTask()">Add Task</button>

<div class="task-sections">

<div class="task-box">

<h3>Incomplete Tasks</h3>
<ul id="todoList"></ul>

</div>

<div class="task-box">

<h3>Completed Tasks</h3>
<ul id="doneList"></ul>

</div>

</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

const todo=document.getElementById("todoList");
const done=document.getElementById("doneList");

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){

const title=document.getElementById("taskInput").value;
const category=document.getElementById("category").value;
const priority=document.getElementById("priority").value;
const date=document.getElementById("dueDate").value;
const description=document.getElementById("description").value;

if(title==="") return;

tasks.push({
title,
category,
priority,
date,
description,
done:false
});

document.getElementById("taskInput").value="";
document.getElementById("description").value="";

save();
render();

}

function render(){

todo.innerHTML="";
done.innerHTML="";

tasks.forEach((task,index)=>{

const li=document.createElement("li");

const info=document.createElement("div");
info.className="task-info";

info.innerHTML=`
<strong>${task.title}</strong><br>
<span class="badge ${task.priority}">${task.priority}</span>
<span class="category">${task.category}</span><br>
<small>Due: ${task.date||"No date selected"}</small><br>
<small>${task.description}</small>
`;

const controls=document.createElement("div");

const tick=document.createElement("button");
tick.innerText="✔";
tick.onclick=()=>{
task.done=!task.done;
save();
render();
};

const del=document.createElement("button");
del.innerText="🗑";
del.onclick=()=>{
tasks.splice(index,1);
save();
render();
};

controls.appendChild(tick);
controls.appendChild(del);

li.appendChild(info);
li.appendChild(controls);

if(task.done){
done.appendChild(li);
}else{
todo.appendChild(li);
}

});

updateProgress();

}

function updateProgress(){

const total=tasks.length;
const completed=tasks.filter(t=>t.done).length;

const percent= total? (completed/total)*100 : 0;

document.getElementById("progressBar").style.width=percent+"%";

}

render();

</script>

</body>
</html>
